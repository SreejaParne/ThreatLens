<!DOCTYPE html>
<html>
<head>
<title>Reports|ThreatLens</title>

<style>
body{
    background:#020617;
    color:#e5e7eb;
    font-family:Arial;
}
button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
.download-btn{
    background:#22c55e;
    color:black;
    font-size:16px;
}
.modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
}
.modal-content{
    background:#020617;
    width:350px;
    padding:25px;
    border-radius:12px;
    margin:150px auto;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.8);
}
select{
    width:100%;
    padding:10px;
    border-radius:6px;
    margin:15px 0;
}
.close{
    float:right;
    cursor:pointer;
    color:#94a3b8;
}
.back{
    margin-top:20px;
    display:inline-block;
    color:#38bdf8;
    text-decoration:none;
}
</style>
</head>

<body>

<h2>📁 Security Reports</h2>

<button class="download-btn" onclick="openModal()">⬇ Download Report</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <h3>Select Report Format</h3>

        <form action="/download_report" method="POST">
            <select name="format" required>
                <option value="csv">CSV Report</option>
                <option value="pdf">PDF Report</option>
                <option value="doc">DOC Report</option>
            </select>

            <button class="download-btn" type="submit">Download</button>
        </form>
    </div>
</div>

<br><br>
<a href="/" class="back">← Back to Dashboard</a>

<script>
function openModal(){
    document.getElementById("modal").style.display="block";
}
function closeModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
