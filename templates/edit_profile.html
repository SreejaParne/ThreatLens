<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
        }
        input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
        h3 {
            margin-top: 20px;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Edit Profile</h2>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <!-- Profile Info -->
        <input name="full_name" value="{{ user.full_name }}" required>
        <input name="organisation" value="{{ user.organisation }}" required>
        <input name="designation" value="{{ user.designation }}" required>

        <!-- 🔐 Change Password Section -->
        <h3>Change Password (Optional)</h3>

        <input type="password" name="old_password" placeholder="Old Password">
        <input type="password" name="new_password" placeholder="New Password">
        <input type="password" name="confirm_password" placeholder="Confirm Password">

        <button type="submit">Update Profile</button>
    </form>
</div>

</body>
</html>
