<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: Arial;
            padding: 40px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        .info {
            margin: 10px 0;
            padding: 10px;
            background: #334155;
            border-radius: 6px;
        }

        .label {
            font-weight: bold;
            color: #38bdf8;
        }

        .btns {
            margin-top: 20px;
            text-align: center;
        }

        a {
            padding: 10px 15px;
            margin: 5px;
            background: #22c55e;
            color: black;
            text-decoration: none;
            border-radius: 6px;
        }

        .logout {
            background: #ef4444;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>User Profile</h2>

    <div class="info"><span class="label">Full Name:</span> {{ user.full_name }}</div>
    <div class="info"><span class="label">Organisation:</span> {{ user.organisation }}</div>
    <div class="info"><span class="label">Designation:</span> {{ user.designation }}</div>
    <div class="info"><span class="label">Email:</span> {{ user.email }}</div>
    <div class="info"><span class="label">Mobile:</span> {{ user.mobile }}</div>
    <div class="info"><span class="label">Role:</span> {{ user.role }}</div>
    <div class="info"><span class="label">Username:</span> {{ user.username }}</div>

    <div class="btns">
        <a href="/edit_profile">Edit Profile</a>
        <a href="/">Dashboard</a>
        <a href="/logout" class="logout">Logout</a>
    </div>
</div>

</body>
</html>
